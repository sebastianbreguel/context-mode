<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>context-mode — Session Insights</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f8f7f4;--card:#ffffff;--border:hsl(240 5% 90%);--border-hover:hsl(240 5% 84%);
  --text:#0f172a;--muted:#64748b;--subtle:#94a3b8;
  --teal:#0d9488;--teal-light:#ccfbf1;--teal-bg:linear-gradient(135deg,#0d9488,#14b8a6);
  --red:#dc2626;--red-light:#fef2f2;--red-border:hsl(0 72% 51% / .2);--red-bg:hsl(0 72% 51% / .04);
  --orange:#ea580c;--orange-light:#fff7ed;--orange-border:hsl(25 95% 53% / .2);--orange-bg:hsl(25 95% 53% / .04);
  --green:#16a34a;--green-light:#f0fdf4;--green-border:hsl(142 76% 36% / .2);--green-bg:hsl(142 76% 36% / .04);
  --blue:#2563eb;--blue-light:#eff6ff;--blue-border:hsl(217 91% 60% / .2);--blue-bg:hsl(217 91% 60% / .04);
  --shadow:0 1px 2px rgba(0,0,0,.05);--shadow-md:0 4px 6px -1px rgba(0,0,0,.07),0 2px 4px -2px rgba(0,0,0,.05);
  --radius:12px;
}
body{background:var(--bg);color:var(--text);font-family:'Plus Jakarta Sans',system-ui,sans-serif;line-height:1.6;-webkit-font-smoothing:antialiased}
.mono{font-family:'JetBrains Mono',monospace;font-size:.8125rem}
.container{max-width:880px;margin:0 auto;padding:2rem 1.5rem 3rem}

/* shadcn Card */
.sc-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:1.5rem;box-shadow:var(--shadow);transition:border-color .15s}
.sc-card:hover{border-color:var(--border-hover)}

/* Hero */
.hero{background:var(--teal-bg);border-radius:16px;padding:2.5rem 2rem;color:#fff;position:relative;overflow:hidden;text-align:center}
.hero::before{content:'';position:absolute;top:-50px;right:-50px;width:160px;height:160px;border-radius:50%;background:rgba(255,255,255,.06)}

/* shadcn Alert */
.alert{position:relative;border-radius:var(--radius);padding:1rem 1rem 1rem 2.75rem;border:1px solid var(--border);background:var(--card);box-shadow:var(--shadow)}
.alert.destructive{border-color:var(--red-border);background:var(--red-bg)}
.alert.warning{border-color:var(--orange-border);background:var(--orange-bg)}
.alert.success{border-color:var(--green-border);background:var(--green-bg)}
.alert.info{border-color:var(--blue-border);background:var(--blue-bg)}
.alert-icon{position:absolute;top:1.125rem;left:1rem;width:16px;height:16px}
.alert-title{font-weight:700;font-size:.875rem;line-height:1.4;margin-bottom:.375rem;color:var(--text)}
.alert-evidence{font-size:.8125rem;color:var(--text);line-height:1.65;margin-top:.25rem;padding:.625rem .75rem;background:rgba(0,0,0,.025);border-radius:8px;border:1px solid rgba(0,0,0,.04)}
.alert-footer{display:flex;align-items:center;justify-content:space-between;margin-top:.75rem;gap:.5rem}
.alert-roi{font-size:.8125rem;font-weight:700;color:var(--green);display:flex;align-items:center;gap:.375rem}
.alert-roi::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--green)}
.alert-action{font-size:.75rem;font-weight:600;color:#fff;padding:.375rem .75rem;border-radius:8px;border:none;cursor:pointer;transition:opacity .15s;white-space:nowrap}
.alert-action:hover{opacity:.85}
.alert-action.destructive{background:var(--red)}
.alert-action.warning{background:var(--orange)}
.alert-action.success{background:var(--green)}
.alert-action.info{background:var(--blue)}

/* Insight groups */
.ig{margin-bottom:1.25rem}
.ig-head{display:flex;align-items:center;gap:.5rem;margin-bottom:.5rem;padding-left:.25rem}
.ig-icon{width:22px;height:22px;border-radius:6px;display:flex;align-items:center;justify-content:center}
.ig-title{font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em}
.ig-count{font-size:.6875rem;color:var(--muted);margin-left:auto}
.ig-cards{display:flex;flex-direction:column;gap:.5rem}

/* shadcn Badge */
.badge{display:inline-flex;align-items:center;padding:.125rem .5rem;border-radius:9999px;font-size:.6875rem;font-weight:600;border:1px solid transparent}
.badge-green{background:var(--green-light);color:var(--green);border-color:var(--green-border)}
.badge-red{background:var(--red-light);color:var(--red);border-color:var(--red-border)}
.badge-blue{background:var(--blue-light);color:var(--blue);border-color:var(--blue-border)}
.badge-orange{background:var(--orange-light);color:var(--orange);border-color:var(--orange-border)}
.badge-teal{background:var(--teal-light);color:var(--teal);border-color:hsl(166 72% 40% / .2)}

/* shadcn Accordion */
.acc-item{border-bottom:1px solid var(--border)}
.acc-trigger{cursor:pointer;font-size:.8125rem;font-weight:600;color:var(--text);display:flex;align-items:center;justify-content:space-between;width:100%;border:none;background:none;padding:.875rem 0;text-align:left;transition:color .15s}
.acc-trigger:hover{color:var(--teal)}
.acc-trigger svg{width:14px;height:14px;color:var(--subtle);transition:transform .2s;flex-shrink:0}
.acc-trigger[data-open="true"] svg{transform:rotate(180deg)}
.acc-content{overflow:hidden;max-height:0;transition:max-height .3s ease}
.acc-content.open{max-height:600px}
.acc-inner{padding-bottom:1rem}

/* Utils */
.label{font-size:.6875rem;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--muted)}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.75rem}
.mini-stat{text-align:center}
.mini-stat .val{font-size:1.25rem;font-weight:800;line-height:1}
.mini-stat .lbl{font-size:.6875rem;color:var(--muted);margin-top:.25rem}
.sep{border-top:1px solid var(--border);margin-top:1rem;padding-top:1rem}
.footer-link{color:var(--muted);text-decoration:none;font-size:.75rem;transition:color .15s}
.footer-link:hover{color:var(--teal)}
.fade{opacity:0;transform:translateY(8px);animation:fadeUp .4s ease forwards}
@keyframes fadeUp{to{opacity:1;transform:none}}

/* Continuity table */
.ct-row{display:grid;grid-template-columns:20px 1.5rem 1fr 1fr;gap:.5rem;align-items:center;padding:.5rem .25rem;font-size:.8125rem;border-bottom:1px solid hsl(240 5% 95%)}
.ct-row:last-child{border-bottom:none}
.ct-check{color:var(--teal);font-weight:700;font-size:.75rem}
.ct-count{font-weight:700;text-align:right}
.ct-type{font-weight:600}
.ct-why{color:var(--muted);text-align:right;font-size:.75rem}

/* How It Works */
.hiw-section{margin-bottom:1rem}
.hiw-section .label{margin-bottom:1rem;display:block}
.hiw-flow{display:flex;flex-direction:column;align-items:center;gap:0}
.hiw-arrow{display:flex;flex-direction:column;align-items:center;color:var(--subtle);line-height:1}
.hiw-arrow-line{width:2px;height:16px;background:var(--subtle)}
.hiw-arrow-head{font-size:1rem;line-height:1;margin-top:-2px}
.hiw-step{text-align:center;font-size:.8125rem;font-weight:600;color:var(--text);padding:.5rem 1.25rem;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow)}
.hiw-step-muted{font-size:.75rem;color:var(--muted);font-weight:400}
.hiw-sandbox{border:2px dashed var(--teal);border-radius:var(--radius);padding:1.25rem 1.5rem;text-align:center;background:hsl(166 72% 40% / .03);max-width:440px;width:100%}
.hiw-sandbox-title{font-size:.875rem;font-weight:700;color:var(--teal);margin-bottom:.5rem;letter-spacing:.02em}
.hiw-sandbox-body{font-size:.8125rem;color:var(--text);line-height:1.6}
.hiw-sandbox-divider{display:flex;align-items:center;gap:.5rem;margin:.75rem 0;color:var(--subtle);font-size:.6875rem;font-weight:600;letter-spacing:.05em;text-transform:uppercase}
.hiw-sandbox-divider::before,.hiw-sandbox-divider::after{content:'';flex:1;height:1px;background:var(--teal);opacity:.3}
.hiw-exit{text-align:center;font-size:.875rem;font-weight:700;color:var(--teal);padding:.375rem .75rem}
.hiw-exit-sub{font-size:.75rem;color:var(--muted);font-weight:400}

/* Think in Code flow */
.hiw-tic{display:flex;align-items:center;justify-content:center;gap:.5rem;flex-wrap:wrap;margin-top:.25rem}
.hiw-tic-step{font-size:.75rem;font-weight:600;color:var(--text);padding:.375rem .75rem;background:var(--card);border:1px solid var(--border);border-radius:8px}
.hiw-tic-arrow{font-size:.75rem;color:var(--teal);font-weight:700}
.hiw-tic-step.highlight{border-color:var(--teal);color:var(--teal);background:var(--teal-light)}

/* Before / After comparison */
.hiw-compare{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-top:1.25rem}
.hiw-col{border-radius:var(--radius);padding:1rem 1.25rem;text-align:center}
.hiw-col-before{background:var(--red-bg);border:1px solid var(--red-border)}
.hiw-col-after{background:var(--green-bg);border:1px solid var(--green-border)}
.hiw-col-title{font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin-bottom:.625rem}
.hiw-col-before .hiw-col-title{color:var(--red)}
.hiw-col-after .hiw-col-title{color:var(--green)}
.hiw-col-val{font-size:1.75rem;font-weight:800;line-height:1}
.hiw-col-before .hiw-col-val{color:var(--red)}
.hiw-col-after .hiw-col-val{color:var(--green)}
.hiw-col-desc{font-size:.75rem;color:var(--muted);margin-top:.375rem;line-height:1.4}
.hiw-col-items{list-style:none;text-align:left;margin-top:.625rem;font-size:.75rem;color:var(--text);line-height:1.8}
.hiw-col-items li::before{content:'';display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:.5rem;position:relative;top:-1px}
.hiw-col-before .hiw-col-items li::before{background:var(--red)}
.hiw-col-after .hiw-col-items li::before{background:var(--green)}

@media(max-width:768px){.grid-2,.grid-3{grid-template-columns:1fr}.container{padding:1.5rem 1rem}.hiw-compare{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="container">

  <div class="hero fade" style="animation-delay:0s;margin-bottom:1.5rem" id="hero"></div>
  <div id="insightsContainer" style="margin-bottom:1.25rem"></div>
  <div class="sc-card fade" style="animation-delay:.3s;margin-bottom:1rem" id="sessionCard"></div>
  <div class="sc-card fade" style="animation-delay:.35s;margin-bottom:1rem" id="ticCard"></div>
  <div class="fade" style="animation-delay:.38s;margin-bottom:1rem" id="howItWorks"></div>
  <div class="sc-card fade" style="animation-delay:.4s;display:flex;align-items:center;justify-content:space-between;padding:1rem 1.5rem" id="footer"></div>

</div>
<script>
Chart.defaults.color='#64748b';Chart.defaults.borderColor='hsl(240 5% 93%)';
Chart.defaults.font.family="'Plus Jakarta Sans',system-ui";Chart.defaults.font.size=11;
const ttCfg={backgroundColor:'#fff',titleColor:'#0f172a',bodyColor:'#0f172a',borderColor:'hsl(240 5% 90%)',borderWidth:1,cornerRadius:8,padding:10,boxPadding:4};

const M={"session":{"id":"sess_abc123","duration_min":12,"tool_calls":47,"started_at":"2026-04-04T10:23:00Z","version":"1.0.64"},"savings":{"processed_kb":847,"entered_kb":12,"saved_kb":835,"pct":98.6,"think_in_code":{"before_kb":714,"after_kb":3.6},"by_tool":[{"tool":"execute","in_kb":412,"out_kb":3.6},{"tool":"search","in_kb":198,"out_kb":4.1},{"tool":"batch","in_kb":156,"out_kb":2.8},{"tool":"fetch","in_kb":81,"out_kb":1.5}]},"activity":{"commits":3,"errors":2,"error_rate_pct":2.1,"error_rate_prev_pct":5.3,"tool_diversity":7,"tool_diversity_max":14,"efficiency_score":72,"efficiency_prev":64,"commits_per_session_avg":1.5,"session_outcome":"productive","productive_pct":82,"exploratory_pct":18},"patterns":{"hourly_commits":[0,0,1,3,5,7,6,4,2,1,1,2,1,0,0],"weekly_trend":[{"day":"Mon","sessions":3,"errors":1,"commits":2},{"day":"Tue","sessions":5,"errors":1,"commits":4},{"day":"Wed","sessions":4,"errors":3,"commits":2},{"day":"Thu","sessions":2,"errors":1,"commits":5},{"day":"Fri","sessions":4,"errors":2,"commits":1}],"iteration_cycles":[{"file":"auth.ts","cycles":3},{"file":"routing.mjs","cycles":1}],"rework":[{"file":"server.ts","edits":4},{"file":"auth.ts","edits":3},{"file":"routing.mjs","edits":2}]},"health":{"claude_md_freshness":[{"project":"context-mode","days_ago":2},{"project":"agentisd","days_ago":5},{"project":"api-server","days_ago":31}],"compactions_this_week":3,"weekly_sessions":18,"permission_denials":[{"type":"curl/wget","count":3},{"type":"WebFetch","count":2},{"type":"inline HTTP","count":1}]},"agents":{"subagents":[{"type":"general-purpose","count":3},{"type":"Explore","count":1},{"type":"Plan","count":1}],"skills":[{"name":"ctx-stats","count":2},{"name":"context-mode-ops","count":1},{"name":"ctx-doctor","count":1}]},"continuity":{"total_events":26,"by_category":[{"category":"requests","count":8,"preview":"Read every TypeScript source file in...","why":"Continues exactly where you left off"},{"category":"tools","count":7,"preview":"ctx_execute, ctx_stats, ctx_search","why":"Tool usage patterns remembered"},{"category":"rules","count":4,"preview":"CLAUDE.md, global rules, project config","why":"Project instructions survive resets"},{"category":"decisions","count":3,"preview":"Use ctx_execute for analysis","why":"Applied automatically — won't ask again"},{"category":"files","count":1,"preview":"ctx-demo-server.js","why":"Restored after compact — no re-read"},{"category":"errors","count":1,"preview":"upgrade command failed","why":"Tracked and monitored across compacts"},{"category":"mode","count":1,"preview":"implement","why":"Session mode survives resets"},{"category":"skills","count":1,"preview":"ctx-stats","why":"Skill invocations tracked"}]},"projects":[{"name":"context-mode","sessions":12},{"name":"agentisd","sessions":8},{"name":"api-server","sessions":4},{"name":"docs-site","sessions":3}]};

const I=[{"hero":"~2 hours saved","severity":"high","badge":"Action needed","source":"CLAUDE.md freshness + error rate","when":"today","metric":"api-server's instructions are 31 days old — error rate there is 2\u00d7 your average","evidence":"Your error rate in api-server is <strong style='color:var(--red)'>4.1%</strong> vs your overall <strong>2.1%</strong>. Your other 2 projects with fresh CLAUDE.md (updated within 5 days) have error rates below 1.5%. Last time you updated project instructions, the error rate dropped within a single session.","action":"Update CLAUDE.md","roi":"~45 min/week saved"},{"severity":"medium","badge":"Pattern","source":"Iteration cycles + rework rate","when":"this session","metric":"auth.ts had 3 edit\u2192run\u2192fix cycles and was reworked 3 times","evidence":"auth.ts accounts for <strong>37.5%</strong> of all edits this session (3 of 8 total) but produced 0 commits. Meanwhile, server.ts had 4 edits but resulted in a commit. The difference: existing tests guiding changes.","action":"Write test first","roi":"~20 min saved per feature"},{"severity":"positive","badge":"Win","source":"Error rate + efficiency score","when":"7-day trend","metric":"Efficiency score jumped 64 \u2192 72 \u2014 error rate halved from 5.3% to 2.1%","evidence":"Three signals improved simultaneously: error rate dropped <strong style='color:var(--green)'>60%</strong>, tool diversity increased from 4 to <strong>7 unique tools</strong>, and commits held steady at 1.5/session. Your CLAUDE.md update on Monday correlates with the error rate drop.","action":"Keep updating weekly","roi":"8-point efficiency gain"},{"severity":"positive","badge":"Win","source":"Hourly productivity","when":"this week","metric":"10am\u20131pm window produced 2.1\u00d7 more commits than afternoon","evidence":"<strong>71%</strong> of commits happened before 1pm. Morning error rate: <strong style='color:var(--green)'>1.2%</strong>. Afternoon: <strong>3.8%</strong>. PM sessions were <strong>82% exploratory</strong> \u2014 useful for research but not for shipping.","action":"Schedule deep work for AM","roi":"~30% more commits/week"},{"severity":"info","badge":"Security","source":"Permission denials + savings","when":"this session","metric":"6 unsafe commands blocked \u2014 all redirected to sandbox","evidence":"3 curl/wget, 2 WebFetch, 1 inline HTTP \u2014 each would have dumped <strong>30\u201360 KB</strong> into context. Combined with Think in Code routing, <strong style='color:var(--teal)'>98.6%</strong> of all tool output stayed in the sandbox.","action":"No action needed","roi":"835 KB kept out of context"},{"severity":"info","badge":"Workflow","source":"Subagent usage","when":"this session","metric":"5 subagents across 3 types \u2014 3 ran in parallel","evidence":"Parallel agents completed research <strong>3\u00d7 faster</strong> than sequential. All 3 were general-purpose \u2014 using <strong>Explore</strong> for search and <strong>Plan</strong> for architecture yields more focused results.","action":"Use specialized agents","roi":"~30% better output quality"}];

const SVG={
  high:'<circle cx="8" cy="8" r="7" stroke="currentColor" stroke-width="1.5" fill="none"/><line x1="8" y1="5" x2="8" y2="9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><circle cx="8" cy="11.5" r=".75" fill="currentColor"/>',
  medium:'<polygon points="8,2 15,14 1,14" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linejoin="round"/><line x1="8" y1="7" x2="8" y2="10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><circle cx="8" cy="12" r=".6" fill="currentColor"/>',
  positive:'<circle cx="8" cy="8" r="7" stroke="currentColor" stroke-width="1.5" fill="none"/><polyline points="5,8 7.5,10.5 11,6" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>',
  info:'<circle cx="8" cy="8" r="7" stroke="currentColor" stroke-width="1.5" fill="none"/><line x1="8" y1="7" x2="8" y2="12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><circle cx="8" cy="5" r=".75" fill="currentColor"/>'
};
const GRP={
  high:{label:'Needs attention',variant:'destructive',color:'var(--red)',bg:'var(--red-light)'},
  medium:{label:'Patterns detected',variant:'warning',color:'var(--orange)',bg:'var(--orange-light)'},
  positive:{label:'Wins this week',variant:'success',color:'var(--green)',bg:'var(--green-light)'},
  info:{label:'Good to know',variant:'info',color:'var(--blue)',bg:'var(--blue-light)'}
};
const chevron='<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="4,6 8,10 12,6"/></svg>';

// ── HERO ──
document.getElementById('hero').innerHTML=`
  <div style="font-size:.8125rem;opacity:.7;margin-bottom:.75rem">This week with context-mode</div>
  <div style="font-size:3.5rem;font-weight:800;line-height:1;letter-spacing:-.03em">${I[0]?.hero||'Session Report'}</div>
  <div style="font-size:1rem;opacity:.85;margin-top:.75rem">Your AI processed ${(M.savings.processed_kb/1024).toFixed(1)} MB but only saw ${M.savings.entered_kb} KB.</div>
  <div style="font-size:.875rem;opacity:.7;margin-top:.25rem">You never had to say "as I mentioned earlier."</div>
  <div style="display:flex;justify-content:center;gap:2rem;margin-top:1.5rem">
    <div><div style="font-size:1.5rem;font-weight:800">${M.health.weekly_sessions}</div><div style="font-size:.6875rem;opacity:.7">sessions</div></div>
    <div><div style="font-size:1.5rem;font-weight:800">${M.activity.commits}</div><div style="font-size:.6875rem;opacity:.7">commits</div></div>
    <div><div style="font-size:1.5rem;font-weight:800">${M.savings.pct}%</div><div style="font-size:.6875rem;opacity:.7">kept out</div></div>
    <div><div style="font-size:1.5rem;font-weight:800">${M.health.compactions_this_week}</div><div style="font-size:.6875rem;opacity:.7">compactions</div></div>
  </div>`;

// ── INSIGHTS ──
const ic=document.getElementById('insightsContainer');
const grouped={};
I.forEach(i=>{if(!grouped[i.severity])grouped[i.severity]=[];grouped[i.severity].push(i)});
let d=0.06;
for(const[sev,items]of Object.entries(grouped)){
  const g=GRP[sev];if(!g)continue;
  ic.innerHTML+=`<div class="ig fade" style="animation-delay:${d}s">
    <div class="ig-head">
      <div class="ig-icon" style="background:${g.bg};color:${g.color}"><svg width="14" height="14" viewBox="0 0 16 16">${SVG[sev]}</svg></div>
      <span class="ig-title" style="color:${g.color}">${g.label}</span>
      <span class="ig-count">${items.length}</span>
    </div>
    <div class="ig-cards">${items.map(ins=>`
      <div class="alert ${g.variant}">
        <svg class="alert-icon" width="16" height="16" viewBox="0 0 16 16" style="color:${g.color}">${SVG[sev]}</svg>

        <div class="alert-evidence">${ins.evidence}</div>
        <div class="alert-footer">
          <div class="alert-roi">${ins.roi}</div>
          <button class="alert-action ${g.variant}">${ins.action} →</button>
        </div>
      </div>`).join('')}
    </div>
  </div>`;
  d+=0.06;
}

// ── SESSION CARD ──
const sc=document.getElementById('sessionCard');
sc.innerHTML=`
  <div style="display:flex;justify-content:space-between;align-items:center">
    <span class="label">This session · ${M.session.duration_min} min · ${M.session.tool_calls} calls</span>
    <span class="badge badge-green">${M.activity.session_outcome}</span>
  </div>
  <div class="grid-3" style="margin-top:1rem">
    <div class="mini-stat"><div class="val" style="color:var(--teal)">${M.activity.commits}</div><div class="lbl">commits</div></div>
    <div class="mini-stat"><div class="val">${M.activity.error_rate_pct}%</div><div class="lbl">error rate</div></div>
    <div class="mini-stat"><div class="val">${M.activity.tool_diversity}</div><div class="lbl">tools used</div></div>
  </div>

  <div style="margin-top:1rem" id="accordionContainer"></div>
`;

// ── ACCORDION SECTIONS ──

const ac=document.getElementById('accordionContainer');
sections.forEach(s=>{
  ac.innerHTML+=`<div class="acc-item">
    <button class="acc-trigger" data-target="${s.id}" data-open="false" onclick="toggleAcc('${s.id}')">
      <span>${s.title}</span>
      ${chevron}
    </button>
    <div class="acc-content" id="acc-${s.id}"><div class="acc-inner" id="inner-${s.id}"></div></div>
  </div>`;
});

let rendered={};
function toggleAcc(id){
  const content=document.getElementById('acc-'+id);
  const trigger=document.querySelector('[data-target="'+id+'"]');
  const open=content.classList.toggle('open');
  trigger.dataset.open=open;
  if(open&&!rendered[id]){
    rendered[id]=true;
    const s=sections.find(x=>x.id===id);
    if(s)s.render(document.getElementById('inner-'+id));
  }
}
